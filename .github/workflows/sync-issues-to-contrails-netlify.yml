name: Sync issues to contrails-netlify

on:
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: sync-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure sync token exists
        run: test -n "${{ secrets.CONTRAILS_SYNC_TOKEN }}"

      - name: Mirror issue to contrails-netlify
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CONTRAILS_SYNC_TOKEN }}
          script: |
            const targetOwner = 'goldjg';
            const targetRepo = 'contrails-netlify';

            const source = context.payload.issue;
            const marker = `<!-- mirrored-from: ${context.repo.owner}/${context.repo.repo}#${source.number} -->`;
            const sourceLabels = source.labels
              .map((label) => typeof label === 'string' ? { name: label, color: 'ededed' } : label)
              .filter((label) => label && label.name)
              .map((label) => ({
                name: label.name,
                color: label.color || 'ededed',
                description: label.description || undefined
              }));
            const mirroredBody = [
              `_Mirrored from ${source.html_url}_`,
              marker,
              '',
              source.body || '_No details provided._'
            ].join('\n');

            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${targetOwner}/${targetRepo} is:issue in:body "${marker}"`,
              per_page: 1
            });

            const existing = search.data.items.find((issue) => !issue.pull_request);

            for (const label of sourceLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: targetOwner,
                  repo: targetRepo,
                  name: label.name
                });
              } catch (error) {
                if (error?.status !== 404) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner: targetOwner,
                    repo: targetRepo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } catch (createError) {
                  if (createError?.status !== 422) {
                    throw createError;
                  }
                }
              }
            }

            let mirroredIssueNumber;
            if (!existing) {
              const created = await github.rest.issues.create({
                owner: targetOwner,
                repo: targetRepo,
                title: source.title,
                body: mirroredBody,
                labels: sourceLabels.map((label) => label.name)
              });
              mirroredIssueNumber = created.data.number;

              if (source.state === 'closed') {
                await github.rest.issues.update({
                  owner: targetOwner,
                  repo: targetRepo,
                  issue_number: mirroredIssueNumber,
                  state: 'closed'
                });
              }
            } else {
              mirroredIssueNumber = existing.number;
              await github.rest.issues.update({
                owner: targetOwner,
                repo: targetRepo,
                issue_number: mirroredIssueNumber,
                title: source.title,
                body: mirroredBody,
                state: source.state,
                labels: sourceLabels.map((label) => label.name)
              });
            }
